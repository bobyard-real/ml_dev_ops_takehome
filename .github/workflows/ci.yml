name: CI/CD

on:
  push:
    branches: [main, "sprutner/**"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ml-inference

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $ECR_REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Tag latest on main
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest
